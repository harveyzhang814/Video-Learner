<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAG 并发执行时序</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0d1117;
  --surface:     #161b22;
  --surface2:    #1c2128;
  --border:      #30363d;
  --border-sub:  #21262d;
  --text:        #e6edf3;
  --text-dim:    #8b949e;
  --text-muted:  #484f58;

  --fetch:    #58a6ff;
  --download: #ff7b72;
  --convert:  #3fb950;
  --ai:       #d2a8ff;
  --conc:     #ffa657;

  --row-h: 34px;
  --label-w: 148px;
  --font: 'JetBrains Mono', 'Fira Code', monospace;
}

html, body { height: 100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  padding: 28px 32px 40px;
}

/* ─── Layout ──────────────────────────────────── */
.page { max-width: 1040px; margin: 0 auto; }

/* ─── Header ──────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.title-block h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
}

.title-block p {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
}

.title-block p code {
  background: var(--surface2);
  border: 1px solid var(--border-sub);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 10px;
}

/* ─── Tabs ─────────────────────────────────────── */
.tabs {
  display: flex;
  gap: 3px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px;
}

.tab {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  padding: 4px 14px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  color: var(--text-dim);
  background: transparent;
  transition: background 0.15s, color 0.15s;
  letter-spacing: 0.02em;
}

.tab.active {
  background: var(--surface2);
  color: var(--text);
  box-shadow: 0 0 0 1px var(--border);
}

.tab:hover:not(.active) { color: var(--text); }

/* ─── Stats bar ────────────────────────────────── */
.stats {
  display: flex;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  overflow: hidden;
  border-bottom: none;
}

.stat {
  flex: 1;
  padding: 10px 16px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.stat:last-child { border-right: none; }

.stat-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  font-weight: 500;
}

.stat-value {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
}

.stat-unit {
  font-size: 11px;
  font-weight: 400;
  opacity: 0.6;
  margin-left: 1px;
}

/* ─── Panel ─────────────────────────────────────── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}

/* ─── Ruler ─────────────────────────────────────── */
.ruler-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  height: 28px;
}

.ruler-label-cell {
  width: var(--label-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
}

.ruler-track {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.ruler-tick {
  position: absolute;
  top: 0;
  bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.ruler-tick-line {
  width: 1px;
  height: 6px;
  background: var(--border);
  margin-top: 0;
}

.ruler-tick-label {
  font-size: 9.5px;
  color: var(--text-muted);
  margin-top: 2px;
  transform: translateX(-50%);
  white-space: nowrap;
  letter-spacing: 0.02em;
}

/* ─── Step rows ──────────────────────────────────── */
.step-row {
  display: flex;
  height: var(--row-h);
  border-bottom: 1px solid var(--border-sub);
  position: relative;
}

.step-row:last-child { border-bottom: none; }

.step-row:hover { background: rgba(255,255,255,0.018); }

.step-label-cell {
  width: var(--label-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px 0 12px;
  gap: 7px;
  cursor: default;
}

.cat-pip {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.step-name-text {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.step-dur-text {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  letter-spacing: 0.01em;
}

.step-track {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* grid lines */
.grid-v {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--border-sub);
  pointer-events: none;
}

/* the bar */
.bar {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  height: 20px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  padding: 0 7px;
  cursor: crosshair;
  will-change: opacity;
  transition: filter 0.1s;
  overflow: hidden;
}

.bar:hover { filter: brightness(1.15) saturate(1.1); }

.bar-inner-label {
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: clip;
  color: rgba(0,0,0,0.75);
  letter-spacing: 0.01em;
  pointer-events: none;
}

/* ─── Concurrency chart ────────────────────────────── */
.conc-row {
  display: flex;
  height: 52px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.15);
}

.conc-label-cell {
  width: var(--label-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}

.conc-chart {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.conc-chart svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ─── Legend ─────────────────────────────────────── */
.legend {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--text-dim);
}

.legend-pip {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ─── Tooltip ─────────────────────────────────────── */
#tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.08s;
  background: #1c2128;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 13px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
  min-width: 180px;
}

#tooltip.show { opacity: 1; }

.tt-header {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 8px;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--border-sub);
}

.tt-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tt-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}

.tt-rows { display: flex; flex-direction: column; gap: 4px; }

.tt-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  font-size: 11px;
}

.tt-key { color: var(--text-muted); }
.tt-val { color: var(--text); font-weight: 500; }

/* ─── Animations ─────────────────────────────────── */
@keyframes bar-slide-in {
  from { opacity: 0; transform: translateY(-50%) scaleX(0); transform-origin: left center; }
  to   { opacity: 1; transform: translateY(-50%) scaleX(1); }
}

.bar.animated { animation: bar-slide-in 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="title-block">
      <h1>DAG 并发执行时序</h1>
      <p>feature/dag-parallel-steps &nbsp;·&nbsp; <code>VL_MAX_PARALLEL_STEPS=3</code> &nbsp;·&nbsp; E2E 实测数据</p>
    </div>
    <div class="tabs">
      <button class="tab active" data-scenario="media">media</button>
      <button class="tab" data-scenario="full">full</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats-bar"></div>

  <!-- Panel -->
  <div class="panel">
    <div class="ruler-row" id="ruler-row">
      <div class="ruler-label-cell">步骤</div>
      <div class="ruler-track" id="ruler-track"></div>
    </div>
    <div id="rows-container"></div>
    <div class="conc-row">
      <div class="conc-label-cell">并发数</div>
      <div class="conc-chart" id="conc-chart"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-pip" style="background:#58a6ff"></div>元数据</div>
      <div class="legend-item"><div class="legend-pip" style="background:#ff7b72"></div>下载</div>
      <div class="legend-item"><div class="legend-pip" style="background:#3fb950"></div>转换</div>
      <div class="legend-item"><div class="legend-pip" style="background:#d2a8ff"></div>AI 生成</div>
    </div>
  </div>

</div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-header">
    <div class="tt-pip" id="tt-pip"></div>
    <div class="tt-name" id="tt-name"></div>
  </div>
  <div class="tt-rows">
    <div class="tt-row"><span class="tt-key">开始</span><span class="tt-val" id="tt-start"></span></div>
    <div class="tt-row"><span class="tt-key">结束</span><span class="tt-val" id="tt-end"></span></div>
    <div class="tt-row"><span class="tt-key">耗时</span><span class="tt-val" id="tt-dur"></span></div>
    <div class="tt-row"><span class="tt-key">类型</span><span class="tt-val" id="tt-cat"></span></div>
  </div>
</div>

<script>
'use strict';

/* ─── Data ─────────────────────────────────────────────────── */
const SERIAL_MS  = 5200;
const CAT_COLOR  = { fetch: '#58a6ff', download: '#ff7b72', convert: '#3fb950', ai: '#d2a8ff' };
const CAT_LABEL  = { fetch: '元数据', download: '下载', convert: '转换', ai: 'AI 生成' };

const SCENARIOS = {
  media: {
    label:         'media 模式',
    totalMs:       2167,
    maxConcurrent: 2,
    steps: [
      { name: 'fetch',     cat: 'fetch',    start: 6,    end: 32   },
      { name: 'subs',      cat: 'download', start: 14,   end: 638  },
      { name: 'video',     cat: 'download', start: 15,   end: 826  },
      { name: 'vtt2md',    cat: 'convert',  start: 627,  end: 952  },
      { name: 'article',   cat: 'ai',       start: 941,  end: 1768 },
      { name: 'translate', cat: 'ai',       start: 942,  end: 1664 },
      { name: 'md2vtt',    cat: 'convert',  start: 1652, end: 2084 },
      { name: 'summary',   cat: 'ai',       start: 1751, end: 2167 },
    ]
  },
  full: {
    label:         'full 模式',
    totalMs:       2167,
    maxConcurrent: 3,
    steps: [
      { name: 'fetch',     cat: 'fetch',    start: 3,    end: 24   },
      { name: 'subs',      cat: 'download', start: 7,    end: 634  },
      { name: 'video',     cat: 'download', start: 8,    end: 823  },
      { name: 'audio',     cat: 'download', start: 9,    end: 740  },
      { name: 'vtt2md',    cat: 'convert',  start: 619,  end: 949  },
      { name: 'article',   cat: 'ai',       start: 933,  end: 1746 },
      { name: 'translate', cat: 'ai',       start: 934,  end: 1641 },
      { name: 'md2vtt',    cat: 'convert',  start: 1640, end: 2061 },
      { name: 'summary',   cat: 'ai',       start: 1743, end: 2167 },
    ]
  }
};

/* ─── State ─────────────────────────────────────────────────── */
let currentScenario = 'media';

/* ─── Utils ─────────────────────────────────────────────────── */
function pct(n, total) { return (n / total * 100).toFixed(4) + '%'; }

function concurrencyAt(t, steps) {
  return steps.filter(s => t >= s.start && t < s.end).length;
}

function tickInterval(totalMs) {
  if (totalMs <= 500)  return 100;
  if (totalMs <= 1200) return 200;
  if (totalMs <= 2500) return 500;
  return 1000;
}

/* ─── Render functions ──────────────────────────────────────── */
function renderStats(key) {
  const sc = SCENARIOS[key];
  const speedup = (SERIAL_MS / sc.totalMs).toFixed(1);
  const saved   = (SERIAL_MS - sc.totalMs);
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat">
      <div class="stat-label">加速比</div>
      <div class="stat-value" style="color:#3fb950">${speedup}<span class="stat-unit">×</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">实际耗时</div>
      <div class="stat-value" style="color:#58a6ff">${sc.totalMs}<span class="stat-unit">ms</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">串行估计</div>
      <div class="stat-value" style="color:var(--text-muted)">${SERIAL_MS}<span class="stat-unit">ms</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">节省时间</div>
      <div class="stat-value" style="color:#ffa657">${saved}<span class="stat-unit">ms</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">最大并发</div>
      <div class="stat-value" style="color:#d2a8ff">${sc.maxConcurrent}<span class="stat-unit"> 步</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">步骤数</div>
      <div class="stat-value" style="color:var(--text-dim)">${sc.steps.length}</div>
    </div>
  `;
}

function renderRuler(totalMs) {
  const track = document.getElementById('ruler-track');
  track.innerHTML = '';
  const interval = tickInterval(totalMs);
  for (let t = 0; t <= totalMs; t += interval) {
    const el = document.createElement('div');
    el.className = 'ruler-tick';
    el.style.left = pct(t, totalMs);
    el.style.position = 'absolute';
    el.style.top = '0';
    el.style.bottom = '0';
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    el.style.alignItems = 'flex-start';
    el.innerHTML = `
      <div class="ruler-tick-line"></div>
      <div class="ruler-tick-label">${t}ms</div>
    `;
    track.appendChild(el);
  }
}

function buildGridLines(totalMs) {
  const interval = tickInterval(totalMs);
  let html = '';
  for (let t = interval; t < totalMs; t += interval) {
    html += `<div class="grid-v" style="left:${pct(t, totalMs)}"></div>`;
  }
  return html;
}

function renderRows(key, animate) {
  const sc = SCENARIOS[key];
  const { totalMs, steps } = sc;
  const container = document.getElementById('rows-container');
  container.innerHTML = '';
  const grids = buildGridLines(totalMs);

  steps.forEach((step, i) => {
    const dur      = step.end - step.start;
    const leftPct  = step.start / totalMs * 100;
    const widthPct = dur / totalMs * 100;
    const color    = CAT_COLOR[step.cat];
    const delay    = animate ? (i * 35) : 0;

    const row = document.createElement('div');
    row.className = 'step-row';
    row.innerHTML = `
      <div class="step-label-cell">
        <div class="cat-pip" style="background:${color}"></div>
        <span class="step-name-text">${step.name}</span>
        <span class="step-dur-text">${dur}ms</span>
      </div>
      <div class="step-track">
        ${grids}
        <div class="bar${animate ? ' animated' : ''}"
             style="left:${leftPct.toFixed(4)}%;
                    width:${Math.max(widthPct, 0.3).toFixed(4)}%;
                    background:${color};
                    animation-delay:${delay}ms"
             data-step="${step.name}"
             data-cat="${step.cat}"
             data-start="${step.start}"
             data-end="${step.end}"
             data-dur="${dur}">
          <span class="bar-inner-label">${widthPct > 4 ? dur + 'ms' : ''}</span>
        </div>
      </div>
    `;
    container.appendChild(row);
  });
}

function renderConcurrencyChart(key) {
  const sc = SCENARIOS[key];
  const { totalMs, steps, maxConcurrent } = sc;
  const SAMPLES = 400;

  const pts = [];
  for (let i = 0; i <= SAMPLES; i++) {
    const t = (i / SAMPLES) * totalMs;
    pts.push({ t, c: concurrencyAt(t, steps) });
  }

  const H = 52;
  const W = 1000;
  const maxC = Math.max(maxConcurrent, 1);

  // Build step path
  const stepPath = pts.map((p, i) => {
    const x = (p.t / totalMs) * W;
    const y = H - (p.c / maxC) * (H - 10);
    return (i === 0 ? 'M' : 'L') + `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  const fillPath = `${stepPath} L${W},${H} L0,${H} Z`;

  // Grid lines for concurrency levels
  let levelLines = '';
  for (let c = 1; c <= maxC; c++) {
    const y = H - (c / maxC) * (H - 10);
    levelLines += `
      <line x1="0" y1="${y.toFixed(1)}" x2="${W}" y2="${y.toFixed(1)}"
            stroke="rgba(255,255,255,0.05)" stroke-width="0.8"/>
      <text x="4" y="${(y - 3).toFixed(1)}"
            font-family="JetBrains Mono, monospace"
            font-size="8" fill="rgba(255,255,255,0.25)">${c}</text>
    `;
  }

  // Vertical grid at tick intervals
  const interval = tickInterval(totalMs);
  let vGridLines = '';
  for (let t = interval; t < totalMs; t += interval) {
    const x = (t / totalMs) * W;
    vGridLines += `<line x1="${x.toFixed(1)}" y1="0" x2="${x.toFixed(1)}" y2="${H}"
                         stroke="rgba(48,54,61,0.8)" stroke-width="0.6"/>`;
  }

  document.getElementById('conc-chart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="conc-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#ffa657" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#ffa657" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      ${vGridLines}
      ${levelLines}
      <path d="${fillPath}" fill="url(#conc-grad)"/>
      <path d="${stepPath}" fill="none" stroke="#ffa657" stroke-width="1.2" stroke-linejoin="round"/>
    </svg>
  `;
}

function renderAll(key, animate) {
  const sc = SCENARIOS[key];
  renderStats(key);
  renderRuler(sc.totalMs);
  renderRows(key, animate);
  renderConcurrencyChart(key);
}

/* ─── Tab switching ──────────────────────────────────────────── */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentScenario = tab.dataset.scenario;
    renderAll(currentScenario, true);
  });
});

/* ─── Tooltip ────────────────────────────────────────────────── */
const tooltip = document.getElementById('tooltip');

document.addEventListener('mousemove', e => {
  const bar = e.target.closest('.bar');
  if (!bar) {
    tooltip.classList.remove('show');
    return;
  }

  const { step, cat, start, end, dur } = bar.dataset;
  document.getElementById('tt-pip').style.background  = CAT_COLOR[cat];
  document.getElementById('tt-name').textContent       = step;
  document.getElementById('tt-start').textContent      = start + 'ms';
  document.getElementById('tt-end').textContent        = end + 'ms';
  document.getElementById('tt-dur').textContent        = dur + 'ms';
  document.getElementById('tt-cat').textContent        = CAT_LABEL[cat];
  tooltip.classList.add('show');

  const tx = e.clientX + 14;
  const ty = e.clientY - 10;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  tooltip.style.left = Math.min(tx, vw - tw - 8) + 'px';
  tooltip.style.top  = Math.min(ty, vh - th - 8) + 'px';
});

document.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

/* ─── Init ────────────────────────────────────────────────────── */
renderAll('media', true);
</script>
</body>
</html>
