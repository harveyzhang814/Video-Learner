# Video-Learner Settings (未来使用)
# 复制此文件为 settings.conf 并修改相应值
# 路径: 复制到 scripts/settings.conf（与 settings.example.conf 同目录）

# 输出语言
# 支持: zh-CN (简体中文), en (英文)
OUTPUT_LANG=zh-CN

# 写作引擎默认值（可被单次 WRITING_ENGINE 覆盖）
# 支持: claude | opencode；不设或非法时回退为 opencode
WRITING_ENGINE_DEFAULT=opencode

# 下载设置
DOWNLOAD_VIDEO=true
DEFAULT_QUALITY=1080p

# 转录设置
TRANSCRIPT_LANG=auto

# 超长视频模式（服务端全局倍率，优先级低于 --long / --ultra-long 的 per-task 设置）
# 1 = 默认，3 = 长视频（1-3 小时），6 = 超长视频（4+ 小时）
# 也可在启动服务前设置环境变量: VL_TIMEOUT_SCALE=3 npm run agent:serve
# VL_TIMEOUT_SCALE=1

# YouTube 人机验证（出现 "Sign in to confirm you're not a bot" 时使用）
# 二选一即可。启用后 yt-dlp 会使用浏览器登录态或 cookie 文件
# 方式一：从已登录的浏览器读取 Cookie（推荐）
# 可选值: chrome, safari, firefox, edge 等，见 yt-dlp --cookies-from-browser 说明
YT_DLP_COOKIES_BROWSER=chrome
# 方式二：使用导出的 Cookie 文件（Netscape 格式）
# 导出方法见 https://github.com/yt-dlp/yt-dlp/wiki/Extractors#exporting-youtube-cookies
# YT_DLP_COOKIES_FILE=/path/to/cookies.txt

# work 根目录（任务产物与 SQLite 数据库的存放位置的父目录）
# 留空 = 默认存放在项目目录下的 work/。
# 设为绝对路径（支持 ~ 展开）可将 work/ 移到项目外，例如 Syncthing 共享目录。
# 实际目录为 <WORK_ROOT>/work，例如下例会用 ~/Syncthing/video-learner/work
# WORK_ROOT=~/Syncthing/video-learner
